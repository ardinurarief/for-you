<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>Happy Birthday Sayangku</title>
    <link
      rel="icon"
      href="https://cdn-icons-png.flaticon.com/128/9965/9965924.png"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        /* Fix Background agar terlihat di HP */
        min-height: 100vh;
        background-color: #fce4ec;
        background-image: url("bg.gif");
        background-size: cover;
        background-position: cover;
        background-attachment: fixed;
        background-repeat: no-repeat;

        font-family: "Poppins", sans-serif;
        overflow-x: hidden;
        position: relative;
      }

      .slide {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.8s ease-in-out;
        z-index: 1;
        padding: 20px;
      }

      .slide.active {
        opacity: 1;
        visibility: visible;
        z-index: 10;
      }

      .container {
        text-align: center;
        background: rgba(255, 255, 255, 0.88);
        backdrop-filter: blur(8px);
        padding: 45px 35px;
        border-radius: 32px;
        box-shadow: 0 20px 40px rgba(244, 143, 177, 0.15);
        max-width: 90%;
        border: 1px solid rgba(255, 255, 255, 0.6);
      }

      h1 {
        font-family: "Dancing Script", cursive;
        font-size: 3.5rem;
        margin-bottom: 10px;
        background: linear-gradient(135deg, #f48fb1, #ec6e9a);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      .btn-start,
      .btn-next {
        background: linear-gradient(135deg, #f48fb1, #ec6e9a);
        color: white;
        border: none;
        padding: 12px 32px;
        border-radius: 40px;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(244, 143, 177, 0.3);
        transition: all 0.3s ease;
        margin-top: 20px;
        font-family: "Poppins", sans-serif;
        display: inline-flex;
        align-items: center;
        gap: 10px;
      }

      .btn-start:hover,
      .btn-next:hover {
        transform: translateY(-2px);
        box-shadow: 0 12px 25px rgba(244, 143, 177, 0.4);
      }

      .message-card {
        background: rgba(255, 255, 255, 0.96);
        backdrop-filter: blur(4px);
        padding: 40px 35px;
        border-radius: 28px;
        box-shadow: 0 20px 35px -10px rgba(0, 0, 0, 0.08);
        text-align: center;
        max-width: 550px;
        width: 100%;
        position: relative;
        color: #4a3b5c;
        min-height: 240px;
        border: 1px solid rgba(244, 143, 177, 0.25);
      }

      .message-text {
        font-size: 0.98rem;
        line-height: 1.75;
        white-space: pre-wrap;
        text-align: center;
        font-weight: 400;
      }

      .cursor {
        color: #f48fb1;
        font-weight: bold;
        animation: blink 0.7s infinite;
        font-size: 1.2rem;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0;
        }
      }

      .btn-next {
        opacity: 0;
        visibility: hidden;
        transform: translateY(10px);
      }

      .btn-next.show {
        opacity: 1;
        visibility: visible;
        transform: translateY(0);
      }

      .spotify-container {
        width: 100%;
        display: flex;
        justify-content: center;
        margin-top: 15px;
      }

      .emoji-img {
        width: 24px;
        height: 24px;
        vertical-align: middle;
        display: inline-block;
        margin: 0 2px;
      }

      .emoji-lg {
        width: 32px;
        height: 32px;
      }

      .music-text {
        font-size: 1rem;
        color: #7a659b;
        margin: 8px 0;
      }

      /* Indikator musik */
      /* .bg-music-status {
        position: fixed;
        bottom: 18px;
        right: 18px;
        background: rgba(255, 255, 240, 0.9);
        backdrop-filter: blur(4px);
        padding: 8px 14px;
        border-radius: 40px;
        font-size: 11px;
        font-weight: 600;
        color: #d46b8c;
        z-index: 999;
        pointer-events: none;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        display: flex;
        align-items: center;
        gap: 8px;
        border: 1px solid #f8c2d4;
        font-family: monospace;
      } */

      /* .bg-music-status i {
        font-size: 13px;
      } */

      @media (max-width: 550px) {
        .container {
          padding: 30px 20px;
        }
        h1 {
          font-size: 2.5rem;
        }
        .message-card {
          padding: 30px 20px;
        }
        .message-text {
          font-size: 0.88rem;
        }
        /* .bg-music-status {
          bottom: 12px;
          right: 12px;
          font-size: 9px;
          padding: 5px 10px;
        } */
      }
    </style>
  </head>
  <body>
    <!-- Audio background - gunakan file music.mp3 Anda -->
    <audio id="bgMusic" loop preload="auto">
      <source src="music.mp3" type="audio/mpeg" />
    </audio>

    <!-- Indikator status musik -->
    <!-- <div class="bg-music-status" id="musicStatusBadge">
      <i class="fas fa-music"></i>
      <span id="musicStatusText">🎵 Musik latar menyala</span>
    </div> -->

    <!-- Slide 1 -->
    <div id="slide1" class="slide active">
      <div class="container">
        <h1>Hi, Sayang!</h1>
        <p class="music-text">
          I made this just for you
          <img
            src="https://cdn-icons-png.flaticon.com/128/14256/14256467.png"
            alt="heart"
            class="emoji-img"
          />
        </p>
        <button class="btn-start" id="startBtn">
          ini diklik ya
          <img
            src="https://cdn-icons-png.flaticon.com/128/42/42734.png"
            alt="smile"
            class="emoji-img"
            style="width: 15px; height: 15px; filter: brightness(0) invert(1)"
          />
        </button>
      </div>
    </div>

    <!-- Slide 2 -->
    <div id="slide2" class="slide">
      <div class="message-card">
        <p id="msg1" class="message-text"></p>
        <span id="cursor1" class="cursor">|</span>
      </div>
      <button id="btn1" class="btn-next" onclick="goToSlide3()">
        Lanjut
        <img
          src="https://cdn-icons-png.flaticon.com/128/3114/3114931.png"
          alt="arrow"
          style="filter: brightness(0) invert(1); width: 20px; height: 20px"
          class="emoji-img"
        />
      </button>
    </div>

    <!-- Slide 3 -->
    <div id="slide3" class="slide">
      <div class="message-card">
        <p id="msg2" class="message-text"></p>
        <span id="cursor2" class="cursor">|</span>
      </div>
      <button id="btn2" class="btn-next" onclick="goToSlide4()">
        Lanjut ke Kejutan
        <img
          src="https://cdn-icons-png.flaticon.com/128/10677/10677337.png"
          alt="gift"
          class="emoji-img"
          style="width: 20px; height: 20px; filter: brightness(0) invert(1)"
        />
      </button>
    </div>

    <!-- Slide 4 (Spotify) -->
    <div id="slide4" class="slide">
      <div
        class="container"
        style="
          background: rgba(255, 255, 255, 0.92);
          width: 100%;
          max-width: 500px;
        "
      >
        <h1 style="font-size: 2.5rem">
          For You
          <img
            src="https://cdn-icons-png.flaticon.com/128/3669/3669986.png"
            alt="music"
            class="emoji-img emoji-lg"
          />
        </h1>
        <p style="margin-bottom: 20px">
          Dengerin ini ya...
          <img
            src="https://cdn-icons-png.flaticon.com/128/9470/9470713.png"
            alt="cool"
            class="emoji-img"
          />
        </p>
        <div class="spotify-container" id="spotifyWrapper">
          <iframe data-testid="embed-iframe" style="border-radius:12px" src="https://open.spotify.com/embed/playlist/2QlHqjAB37GTLU07CPVC7L?utm_source=generator" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>
        <button class="btn-start" style="margin-top: 30px" id="reloadBtn">
          Ulangi dari Awal
          <img
            src="https://cdn-icons-png.flaticon.com/128/2805/2805355.png"
            alt="repeat"
            class="emoji-img"
            style="width: 18px; height: 18px; filter: brightness(0) invert(1)"
          />
        </button>
      </div>
    </div>

    <script>
      // ====================== ELEMENTS ======================
      const bgAudio = document.getElementById("bgMusic");
      const slides = [
        document.getElementById("slide1"),
        document.getElementById("slide2"),
        document.getElementById("slide3"),
        document.getElementById("slide4"),
      ];
      const musicStatusSpan = document.getElementById("musicStatusText");

      // Status flags
      let audioUnlocked = false; // apakah user sudah berinteraksi
      let bgMutedBySpotify = false; // apakah bg dimatikan karena spotify

      // Update UI status musik
      function updateMusicStatusUI(isPlaying) {
        if (musicStatusSpan) {
          if (isPlaying && !bgMutedBySpotify) {
            musicStatusSpan.innerHTML = "🎵 Musik latar menyala";
            document.querySelector(".bg-music-status i").className =
              "fas fa-music";
          } else if (bgMutedBySpotify) {
            musicStatusSpan.innerHTML =
              "🔇 Musik latar mati (lagu Spotify diputar)";
            document.querySelector(".bg-music-status i").className =
              "fas fa-volume-mute";
          } else {
            musicStatusSpan.innerHTML = "⏸ Musik latar standby";
            document.querySelector(".bg-music-status i").className =
              "fas fa-pause";
          }
        }
      }

      // Matikan background music (karena Spotify diputar)
      function muteBackgroundMusicForSpotify() {
        if (!bgMutedBySpotify) {
          bgMutedBySpotify = true;
          if (!bgAudio.paused) {
            bgAudio.pause();
          }
          updateMusicStatusUI(false);
          console.log(
            "Background music dimatikan karena Spotify playlist diputar",
          );
        }
      }

      // Hidupkan background music (kecuali jika dimatikan oleh Spotify)
      function playBackgroundMusic() {
        if (!bgMutedBySpotify && audioUnlocked) {
          bgAudio.play().catch((e) => {
            console.log("Autoplay masih perlu izin user:", e);
          });
          updateMusicStatusUI(true);
        } else if (bgMutedBySpotify) {
          updateMusicStatusUI(false);
        }
      }

      // Unlock audio setelah user klik tombol start
      function unlockAudio() {
        if (!audioUnlocked) {
          // Coba play dan langsung pause untuk membuka izin browser
          let playPromise = bgAudio.play();
          if (playPromise !== undefined) {
            playPromise
              .then(() => {
                bgAudio.pause();
                audioUnlocked = true;
                bgAudio.currentTime = 0;
                // Setelah unlock, mainkan musik (kecuali sudah dimatikan spotify)
                if (!bgMutedBySpotify) {
                  bgAudio.play().catch((e) => console.log("play start:", e));
                  updateMusicStatusUI(true);
                }
              })
              .catch(() => {
                // tetap anggap unlocked meskipun gagal, user akan klik lagi
                audioUnlocked = true;
              });
          } else {
            audioUnlocked = true;
          }
        }
      }

      // ====================== NAVIGASI ======================
      function goToSlide2() {
        if (!bgMutedBySpotify && audioUnlocked) {
          bgAudio.play().catch((e) => console.log("play slide2:", e));
          updateMusicStatusUI(true);
        }
        slides[0].classList.remove("active");
        slides[1].classList.add("active");
        setTimeout(() => typeWriter("msg1", text1, "cursor1", "btn1"), 1000);
      }

      function goToSlide3() {
        slides[1].classList.remove("active");
        slides[2].classList.add("active");
        setTimeout(() => typeWriter("msg2", text2, "cursor2", "btn2"), 1000);
      }

      function goToSlide4() {
        slides[2].classList.remove("active");
        slides[3].classList.add("active");
        // Saat masuk slide Spotify, matikan background music
        muteBackgroundMusicForSpotify();
      }

      // Efek mengetik
      function typeWriter(elementId, text, cursorId, btnId) {
        let i = 0;
        const element = document.getElementById(elementId);
        element.textContent = "";
        function typing() {
          if (i < text.length) {
            element.textContent += text.charAt(i);
            i++;
            setTimeout(typing, 40);
          } else {
            const cursorSpan = document.getElementById(cursorId);
            if (cursorSpan) cursorSpan.style.display = "none";
            const btnElem = document.getElementById(btnId);
            if (btnElem) btnElem.classList.add("show");
          }
        }
        typing();
      }

      // ====================== TEKS PESAN ======================
      const text1 = `sayangg. terimakasih udah mau bareng dan memilih untuk bertahan sama aku selama 1 bulan ini, walaupun ada yang gak suka sama hubungan kita bukan berarti kita ikut ngelepas apa yang udah kita bangun dari awal. at the end of the day, you're still the person i choose dan aku harap kamu juga tetep pilih aku ya sayang? no metter how hard things get nanti nya. semoga kita masih tetep bareng sampe bulan atau tahun selanjutnya, i love u more than myself sayangg.`;

      const text2 = `aku kadang masih gak nyangka bisa milikin kamu hehee yang dari awalnya aku cuma bisa mantau kamu di gc, stalking dan jadi penonton story kamu doang. tapi sekarang aku udah bisa peluk cium kamu, sleepcall-an sama kamu, dapet perhatian kamu, dimanjain sama kamu, etc.

in my single day, aku selalu bertanya tanya ke diri aku like "dominic udah ada pacar belum ya","chat gak ya?","how to i start?","freak gak ya kalo gua chat di anon?" wkwkw after all aku berani nurunin gengsi, even berasa freak dan malu tapi ternyata semuanya worth it banget buat di jalanin.

dan sekarang aku seneng banget, ternyata keputusan aku buat ngejer kamu waktu itu berhasil. berhasil bikin aku punya someone to talk again after long time, someone yang selalu jadi alesan buat aku tersenyum terus akhir akhir ini, someone yang bisa bikin mood aku baik terus cuma lewat chat sederhana. maybe i looked a lill crazy for loving u so much hehee but seriously, i love u so more than anything, everything, and myselft too :(`;

      // ====================== EVENT LISTENER ======================
      // Tombol start di slide 1
      const startButton = document.getElementById("startBtn");
      if (startButton) {
        startButton.addEventListener("click", (e) => {
          e.preventDefault();
          unlockAudio(); // unlock dan mainkan musik
          goToSlide2();
        });
      }

      // Tombol reload (ulang dari awal) - refresh total
      const reloadBtn = document.getElementById("reloadBtn");
      if (reloadBtn) {
        reloadBtn.addEventListener("click", (e) => {
          e.preventDefault();
          if (bgAudio) bgAudio.pause();
          window.location.reload();
        });
      }

      // ========== FITUR UTAMA: DETEKSI KLIK DI PLAYLIST SPOTIFY ==========
      // Saat user mengklik area playlist (berarti dia akan memutar lagu), matikan backsound
      const spotifyWrapper = document.getElementById("spotifyWrapper");
      const spotifyIframe = document.getElementById("spotifyIframe");

      function setupSpotifyMuteOnClick() {
        // Fungsi untuk mematikan bg saat user berinteraksi dengan playlist
        const muteOnSpotifyInteraction = () => {
          // Cek apakah slide4 sedang aktif
          if (slides[3].classList.contains("active") && !bgMutedBySpotify) {
            muteBackgroundMusicForSpotify();
          }
        };

        if (spotifyWrapper) {
          spotifyWrapper.addEventListener("click", muteOnSpotifyInteraction);
        }
        if (spotifyIframe) {
          // iframe mungkin butuh pendekatan berbeda, tapi klik di iframe tetap terdeteksi di wrapper
          spotifyIframe.addEventListener("click", muteOnSpotifyInteraction);
          // tambahkan juga event load untuk memastikan
          spotifyIframe.addEventListener("load", () => {
            // Tidak bisa akses internal, tapi setidaknya wrapper sudah siap
          });
        }

        // Tambahan: mendeteksi sentuhan di mobile
        document.body.addEventListener("touchstart", (e) => {
          // Jika target ada di dalam spotify container dan slide aktif
          if (slides[3].classList.contains("active") && !bgMutedBySpotify) {
            let target = e.target;
            if (
              spotifyWrapper &&
              (spotifyWrapper.contains(target) ||
                spotifyIframe?.contains(target))
            ) {
              muteBackgroundMusicForSpotify();
            }
          }
        });
      }

      // Panggil fungsi setup
      setupSpotifyMuteOnClick();

      // Jika karena suatu hal slide4 sudah aktif sejak awal (tapi tidak mungkin), tetap matikan musik
      if (slides[3].classList.contains("active")) {
        muteBackgroundMusicForSpotify();
      }

      // Pastikan volume tidak terlalu keras
      bgAudio.volume = 0.4;

      // Tampilkan status awal
      updateMusicStatusUI(false);

      // Mengekspos fungsi ke global agar onclick di HTML berfungsi
      window.goToSlide2 = goToSlide2;
      window.goToSlide3 = goToSlide3;
      window.goToSlide4 = goToSlide4;

      console.log(
        "Siap! Musik latar akan otomatis mati saat kamu mengklik playlist Spotify.",
      );
    </script>
  </body>
</html>
